name: Android Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  DOTNET_VERSION: "9.0.x"
  PROJECT_PATH: Bellwood.DriverApp.csproj
  TARGET_FRAMEWORK: net9.0-android

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/release.keystore"

      - name: Build signed APK
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -f ${{ env.TARGET_FRAMEWORK }} \
            -c Release \
            -p:AndroidPackageFormat=apk \
            -p:AndroidSigningKeyStore="${{ runner.temp }}/release.keystore" \
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_SIGNING_STORE_PASS }}" \
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}" \
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_SIGNING_KEY_PASS }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./**/publish/*.apk

      - name: Build signed AAB
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -f ${{ env.TARGET_FRAMEWORK }} \
            -c Release \
            -p:AndroidPackageFormat=aab \
            -p:AndroidSigningKeyStore="${{ runner.temp }}/release.keystore" \
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_SIGNING_STORE_PASS }}" \
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}" \
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_SIGNING_KEY_PASS }}"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: ./**/publish/*.aab

      - name: Cleanup keystore
        if: always()
        run: rm -f "${{ runner.temp }}/release.keystore"
